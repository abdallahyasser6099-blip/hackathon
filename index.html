<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CANHYGIENE - Team 9 Presentation</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;background:#06112f;color:white;overflow:hidden}.app{height:100vh;position:relative;overflow:hidden}.bg,.grid,.vignette{position:absolute;inset:0}.grid{background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:56px 56px}.vignette{background:radial-gradient(circle at center,transparent 0,rgba(2,6,23,.28) 72%)}.wrap{position:relative;z-index:2;height:100vh;max-width:1280px;margin:auto;padding:20px 24px;display:flex;flex-direction:column}.bar,.footer{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);backdrop-filter:blur(22px);box-shadow:0 20px 60px rgba(0,0,0,.25);border-radius:24px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}.brand,.right{display:flex;align-items:center;gap:12px}.logoBox{position:relative;border-radius:18px;background:rgba(255,255,255,.1);padding:8px;box-shadow:0 15px 35px rgba(0,0,0,.25)}.logoBox:before{content:"";position:absolute;inset:0;background:rgba(34,211,238,.22);filter:blur(16px);border-radius:18px}.logo{position:relative;height:40px;width:auto;display:block}.brandTitle{font-weight:900;font-size:18px}.brandSub{font-size:12px;text-transform:uppercase;letter-spacing:.24em}.auto,.count,.mid,.timer,.start{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);border-radius:16px;color:inherit;padding:8px 12px;font-weight:800;font-size:12px}.start{background:#22d3ee;color:#020617;font-weight:950;box-shadow:0 0 22px rgba(34,211,238,.7);cursor:pointer}.timer{background:rgba(0,0,0,.4);font-size:14px}.timer.low{background:rgba(239,68,68,.25);color:#fee2e2;border-color:rgba(252,165,165,.5)}.dots{display:flex;gap:8px}.dot{height:10px;width:10px;border-radius:999px;background:rgba(255,255,255,.25);border:0;transition:.25s}.dot.active{width:30px}.progress{height:6px;background:rgba(255,255,255,.1);border-radius:99px;margin:12px 0;overflow:hidden}.progress div{height:100%;border-radius:99px;transition:.4s}.main{position:relative;min-height:0;flex:1}.slide{position:relative;height:100%;overflow:hidden;border-radius:34px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.065);backdrop-filter:blur(24px);box-shadow:0 35px 100px rgba(3,10,45,.45);padding:32px;animation:enter .45s ease}.slide:before,.slide:after{content:"";position:absolute;border-radius:999px;filter:blur(60px);opacity:.65}.slide:before{width:280px;height:280px;right:-90px;top:-90px;background:rgba(34,211,238,.12)}.slide:after{width:220px;height:220px;left:-70px;bottom:35px;background:rgba(59,130,246,.12)}@keyframes enter{from{opacity:0;transform:translateY(20px) scale(.985)}to{opacity:1;transform:none}}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(103,232,249,.3);background:rgba(34,211,238,.1);color:#cffafe;border-radius:999px;padding:9px 16px;font-size:14px;font-weight:800;backdrop-filter:blur(18px);margin-bottom:16px}.title{font-size:clamp(36px,4vw,60px);line-height:.98;font-weight:950;letter-spacing:-.04em;margin:0;max-width:1050px}.subtitle{font-size:clamp(20px,2vw,28px);line-height:1.25;color:#67e8f9;font-weight:800;max-width:850px;margin:22px 0 0}.cards,.bulletGrid{display:grid;gap:16px;margin-top:32px}.cards{grid-template-columns:repeat(3,1fr);max-width:850px}.bulletGrid{grid-template-columns:repeat(2,1fr)}.card,.bullet,.metric{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.085);backdrop-filter:blur(22px);box-shadow:0 24px 70px rgba(8,20,60,.25)}.card{border-radius:28px;padding:20px;font-weight:850;font-size:19px}.bullet{display:flex;gap:16px;align-items:flex-start;min-height:104px;border-radius:27px;padding:20px}.num{flex:0 0 40px;height:40px;border-radius:14px;background:rgba(52,211,153,.18);color:#a7f3d0;display:flex;align-items:center;justify-content:center;font-weight:950}.bullet p{margin:0;font-size:18px;line-height:1.45;font-weight:750}.danger .slide{border-color:rgba(248,113,113,.25);background:rgba(69,10,10,.24)}.yellow .slide{border-color:rgba(253,224,71,.25);background:rgba(113,63,18,.22)}.green .slide{border-color:rgba(110,231,183,.25);background:rgba(6,78,59,.24)}.danger .title,.danger .pill{color:#fee2e2}.yellow .title,.yellow .pill{color:#fef9c3}.green .title,.green .pill{color:#ecfdf5}.danger .pill{border-color:rgba(248,113,113,.45);background:rgba(239,68,68,.13)}.yellow .pill{border-color:rgba(253,224,71,.45);background:rgba(250,204,21,.13)}.green .pill{border-color:rgba(110,231,183,.45);background:rgba(16,185,129,.13)}.danger .bullet{border-color:rgba(248,113,113,.35);background:rgba(239,68,68,.12);box-shadow:0 20px 60px rgba(239,68,68,.22)}.yellow .bullet{border-color:rgba(253,224,71,.35);background:rgba(250,204,21,.12);box-shadow:0 20px 60px rgba(245,158,11,.22)}.green .bullet{border-color:rgba(110,231,183,.3);background:rgba(110,231,183,.12);box-shadow:0 22px 65px rgba(16,185,129,.24)}.premium .slide{background:linear-gradient(135deg,rgba(3,7,40,.78),rgba(15,23,80,.68)),radial-gradient(circle at 20% 20%,rgba(56,189,248,.42),transparent 40%)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:32px}.metric{text-align:center;border-radius:29px;padding:22px}.metric b{font-size:clamp(36px,4vw,54px);color:#67e8f9}.metric p{color:#cbd5e1;margin:12px 0 0;line-height:1.5}.imgSlide{text-align:center;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.imgFrame{margin-top:22px;display:inline-flex;max-width:94%;max-height:72%;border-radius:34px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);padding:12px;box-shadow:0 30px 90px rgba(0,0,0,.5);backdrop-filter:blur(22px);align-items:center;justify-content:center}.uiimg{max-width:100%;max-height:490px;object-fit:contain;border-radius:26px;display:block}.footer{margin-top:14px}.nav{height:44px;border-radius:16px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;padding:0 24px;font-weight:900;cursor:pointer}.next{color:#06112f}.glow{position:absolute;width:220px;height:220px;right:40px;top:35%;border-radius:50%;background:rgba(34,211,238,.3);filter:blur(52px);animation:glow 6s ease-in-out infinite;pointer-events:none}.glow.two{right:180px;top:auto;bottom:20px;opacity:.6}@keyframes glow{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.2);opacity:.7}}@media(max-width:900px){.metrics{grid-template-columns:repeat(2,1fr)}.cards,.bulletGrid{grid-template-columns:1fr}.title{font-size:34px}.subtitle{font-size:20px}.wrap{padding:12px}.right .dots{display:none}.uiimg{max-height:430px}.bar{gap:10px}.right{gap:6px}}
</style>
</head>
<body><div id="app" class="app"></div><script>
const icons={logo:'◆',problem:'⚠️',solution:'🚀',manager:'👔',team:'👥',target:'🎯',chart:'📊',growth:'📈',search:'🔎',star:'⭐',evaluation:'📋',decision:'🧭',value:'💎',trophy:'🏆',dashboard:'▦',briefcase:'💼',kpi:'📌',insight:'💡',training:'🏫',meeting:'🤝',calendar:'📅'};
const slides=[
{type:'hero',icon:'target',eyebrow:'Performance challenge',title:'Why do companies still struggle to make the right HR decisions?',subtitle:'Despite having data, decisions are still slow, unclear, and sometimes wrong.',points:['Too much scattered data','No clear decision view','Time lost in analysis']},
{type:'hero',icon:'manager',eyebrow:'Real story',title:'Meet Miss Amina, HR manager at Canhygiene.',subtitle:'She manages employee performance using Excel and disconnected tools.',points:['Excel-based workflow','Manual evaluation','Hard to organize']},
{type:'danger',theme:'red',icon:'problem',eyebrow:'Problem',title:'A fragmented and inefficient workflow.',points:['Data scattered across files','No centralized evaluation','No real-time visibility','Decisions are delayed']},
{type:'danger',theme:'red',icon:'problem',eyebrow:'Impact',title:'This directly affects company performance.',points:['Wrong HR decisions','Loss of productivity','No growth clarity','Manager overload']},
{type:'danger',theme:'yellow',icon:'briefcase',eyebrow:'Existing solutions',title:'Current tools do not solve the core issue.',points:['70% of HR still use Excel manually','50% waste time on data consolidation','No decision intelligence','Poor UX and complex systems']},
{type:'success',icon:'solution',eyebrow:'Our solution',title:'A smart SaaS platform for HR decisions.',points:['Centralized data','Clear performance view','Instant decision support','Growth-focused system']},
{type:'premium',icon:'decision',eyebrow:'How it works',title:'From search to decision in seconds.',points:['Search employee','View performance','Analyze gaps','Take action instantly']},
{type:'image',icon:'dashboard',eyebrow:'Dashboard',title:'Real platform dashboard.',image:'https://i.postimg.cc/Y0mfY1vW/photo-6006072491840834588-y-(1).jpg'},
{type:'image',icon:'chart',eyebrow:'Statistics',title:'Statistics inside the dashboard.',image:'https://i.postimg.cc/xds9GJ7Q/photo-6008324291654519811-y.jpg'},
{type:'image',icon:'insight',eyebrow:'AI Assistant',title:'AI assistant interaction.',image:'https://i.postimg.cc/wTQFVQWm/photo-6008324291654519793-x.jpg'},
{type:'image',icon:'insight',eyebrow:'AI Feature',title:'Advanced AI recommendation.',image:'https://i.postimg.cc/MTzpyxX0/photo-6008324291654519797-y.jpg'},
{type:'image',icon:'insight',eyebrow:'AI Insight',title:'Focused smart evaluation view.',image:'https://i.postimg.cc/Y2bhz464/photo-6008324291654519795-y.jpg'},
{type:'premium',icon:'search',eyebrow:'Feature',title:'Smart Search',points:['Instant employee lookup','Search by name, role, skills','Fast and accurate results','Zero manual filtering']},
{type:'premium',icon:'kpi',eyebrow:'Feature',title:'Performance KPIs',points:['Track employee performance','Clear measurable indicators','Visual dashboards','Easy comparisons']},
{type:'premium',icon:'star',eyebrow:'Feature',title:'Top Talent Detection',points:['Identify best employees','Highlight high performers','Support promotions','Data-driven recognition']},
{type:'premium',icon:'training',eyebrow:'Feature',title:'Training Recommendations',points:['Detect skill gaps','Suggest improvements','Personalized learning paths','Continuous development']},
{type:'premium',icon:'calendar',eyebrow:'Feature',title:'Progress Tracking',points:['Monitor employee growth','Track improvements over time','Real-time updates','Historical performance']},
{type:'premium',icon:'meeting',eyebrow:'Feature',title:'Decision Support',points:['Make faster HR decisions','AI-powered insights','Reduce uncertainty','Confident actions']},
{type:'premium',icon:'chart',eyebrow:'Analytics',title:'Smart insights that drive decisions.',points:['Department dashboards','Skill gap detection','Performance ranking','Historical insights']},
{type:'saas',icon:'growth',eyebrow:'SaaS Value',title:'Scalable SaaS solution.',metrics:[['80%','less manual work'],['3x','faster evaluations'],['+40%','better decisions'],['24/7','cloud access']]},
{type:'premium',icon:'value',eyebrow:'Why us',title:'Built to outperform existing tools.',points:['All-in-one system','Simple UX','Real-time data','Scalable architecture']},
{type:'impact',icon:'growth',eyebrow:'Results',title:'Measurable business impact.',metrics:[['70%','time saved'],['+30%','faster decisions'],['100%','visibility'],['1','platform']]},
{type:'final',icon:'value',eyebrow:'Conclusion',title:'From chaos to clarity.',subtitle:'We transform HR decisions.'},
{type:'bullet',icon:'team',eyebrow:'Status',title:'Already developed and ready.',ordered:true,points:['Complete SaaS workflow','Dashboard + search','Analytics engine','Modern UX ready']}
];
let index=0,auto=false,started=false,seconds=300,autoTimer=null,countdown=null;const app=document.getElementById('app');
function theme(s){return s.type==='success'?'green':s.type==='danger'?(s.theme==='yellow'?'yellow':'danger'):s.type==='premium'?'premium':'default'}
function accent(t){return t==='danger'?'#ef4444':t==='yellow'?'#facc15':t==='green'?'#10b981':'#20c9b5'}
function bg(t){if(t==='danger')return'radial-gradient(circle at 15% 15%, rgba(239,68,68,.58), transparent 30%),radial-gradient(circle at 85% 12%, rgba(185,28,28,.45), transparent 32%),radial-gradient(circle at 50% 100%, rgba(127,29,29,.6), transparent 48%)';if(t==='yellow')return'radial-gradient(circle at 15% 15%, rgba(250,204,21,.58), transparent 30%),radial-gradient(circle at 85% 12%, rgba(245,158,11,.48), transparent 32%),radial-gradient(circle at 50% 100%, rgba(120,53,15,.6), transparent 48%)';if(t==='green')return'radial-gradient(circle at 15% 15%, rgba(16,185,129,.58), transparent 30%),radial-gradient(circle at 85% 12%, rgba(34,211,238,.38), transparent 32%),radial-gradient(circle at 50% 100%, rgba(6,95,70,.62), transparent 48%)';return'radial-gradient(circle at 15% 15%, rgba(31,199,181,.38), transparent 28%),radial-gradient(circle at 85% 10%, rgba(96,165,250,.30), transparent 30%),radial-gradient(circle at 50% 100%, rgba(37,64,143,.55), transparent 45%)'}
function title(s,d=false,y=false,center=false){return`<div style="${center?'text-align:center':''}"><div class="pill" style="${center?'margin-left:auto;margin-right:auto':''}">${d?(y?'⚡':'⚠️'):(icons[s.icon]||icons.logo)} ${s.eyebrow}</div><h1 class="title" style="${center?'margin-left:auto;margin-right:auto':''}">${s.title}</h1>${s.subtitle?`<p class="subtitle" style="${center?'margin-left:auto;margin-right:auto':''}">${s.subtitle}</p>`:''}</div>`}
function bullets(s,ordered=false){return`<div class="bulletGrid">${(s.points||[]).map((p,i)=>`<div class="bullet"><div class="num">${ordered?i+1:'✓'}</div><p>${p}</p></div>`).join('')}</div>`}
function hero(s){return`${title(s)}<div class="cards">${s.points.map((p,i)=>`<div class="card"><div style="font-size:40px;margin-bottom:8px">${[icons.evaluation,icons.insight,icons.growth][i]}</div>${p}</div>`).join('')}</div>`}
function metrics(s){return`${title(s)}<div class="metrics">${s.metrics.map(m=>`<div class="metric"><b>${m[0]}</b><p>${m[1]}</p></div>`).join('')}</div>`}
function imageSlide(s){return`<div class="imgSlide">${title(s,false,false,true)}<div class="imgFrame"><img class="uiimg" src="${s.image}" alt="${s.title}"></div></div>`}
function renderSlide(s){if(s.type==='hero')return hero(s);if(s.type==='impact'||s.type==='saas')return metrics(s);if(s.type==='image')return imageSlide(s);if(s.type==='final')return`<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div class="pill">${icons.value} ${s.eyebrow}</div><h1 class="title">${s.title}</h1><p class="subtitle">${s.subtitle}</p><div style="margin-top:28px;background:#20c9b5;color:#06112f;border-radius:26px;padding:16px 32px;font-size:20px;font-weight:950">Ready for real-world deployment</div></div>`;return`${title(s,s.type==='danger',s.theme==='yellow')}${bullets(s,s.ordered)}`}
function mmss(){return Math.floor(seconds/60)+':'+String(seconds%60).padStart(2,'0')}
function render(){const s=slides[index],t=theme(s),a=accent(t);app.className='app '+t;app.innerHTML=`<div class="bg" style="background:${bg(t)}"></div><div class="grid"></div><div class="vignette"></div><div class="wrap"><header class="bar"><div class="brand"><div class="logoBox"><img class="logo" src="https://i.postimg.cc/MHMzL9CB/image.png" onerror="this.style.display='none'" /></div><div><div class="brandTitle">CANHYGIENE</div><div class="brandSub" style="color:${a}">Team 9 presentation</div></div></div><div class="right">${index===0&&!started?'<button class="start" onclick="startPresentation()">▶ Start (5 min)</button>':''}${started?`<div class="timer ${seconds<=30?'low':''}">⏱ ${mmss()}</div>`:''}<button class="auto" onclick="toggleAuto()">Auto: ${auto?'ON':'OFF'}</button><div class="dots">${slides.map((_,i)=>`<button class="dot ${i===index?'active':''}" onclick="go(${i})" style="${i===index?`background:${a};box-shadow:0 0 18px ${a}`:''}"></button>`).join('')}</div><div class="count" style="color:${a}">${index+1} / ${slides.length}</div></div></header><div class="progress"><div style="width:${((index+1)/slides.length)*100}%;background:${a};box-shadow:0 0 22px ${a}"></div></div><main class="main"><div class="glow" style="background:${a}55"></div><div class="glow two" style="background:${a}55"></div><section class="slide">${renderSlide(s)}</section></main><footer class="footer"><button class="nav" onclick="prev()">← Previous</button><div class="mid">Slide ${index+1} / ${slides.length} · use ← → or space</div><button class="nav next" onclick="next()" style="background:${a}">Next →</button></footer></div>`}
function startPresentation(){started=true;seconds=300;if(countdown)clearInterval(countdown);countdown=setInterval(()=>{seconds=Math.max(0,seconds-1);render();if(seconds<=0)clearInterval(countdown)},1000);render()}
function go(i){index=Math.max(0,Math.min(slides.length-1,i));render()}function next(){go(index+1)}function prev(){go(index-1)}function toggleAuto(){auto=!auto;if(autoTimer)clearInterval(autoTimer);if(auto)autoTimer=setInterval(()=>{if(index<slides.length-1)next();else toggleAuto()},8000);render()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev()});render();
</script></body></html>
